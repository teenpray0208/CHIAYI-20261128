<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>嘉義市 2026 市長選舉選情預估地圖｜台灣民眾黨</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --header:#1a2744;--green1:#145a2e;--green2:#1e8c46;--green3:#3ab96a;
  --blue1:#0d3070;--blue2:#1451a0;--blue3:#2e78d4;
  --orange:#c25d00;--orange2:#f0870a;
  --white:#fff;--muted:#94a3b8;--border:rgba(255,255,255,.15);
  --panel:rgba(15,23,42,.88);--panel2:rgba(255,255,255,.97);
  --text:#1e293b;
}
html,body{font-family:"Noto Sans TC",sans-serif;height:100%;overflow:hidden;background:#1a2744}

/* HEADER */
.hd{position:fixed;top:0;left:0;right:0;height:54px;background:var(--header);z-index:1000;display:flex;align-items:center;padding:0 14px;gap:12px;border-bottom:1px solid rgba(255,255,255,.1)}
.hd-title{flex:1;min-width:0}
.hd-title h1{font-size:15px;font-weight:700;color:#e8f0fe;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hd-meta{font-size:10px;color:var(--muted);margin-top:2px}
.hd-tabs{display:flex;gap:5px;flex-shrink:0}
.hd-tab{padding:5px 13px;border-radius:18px;font-size:11.5px;font-weight:600;cursor:pointer;border:1.5px solid rgba(255,255,255,.25);background:transparent;color:#c5d5f0;transition:all .2s;white-space:nowrap}
.hd-tab.active{background:#e8f0fe;color:#1a2744;border-color:#e8f0fe}
.hd-clock{font-size:11px;color:#94a3b8;font-weight:500;white-space:nowrap;letter-spacing:.3px}

/* MAP */
#map{position:fixed;top:54px;left:0;right:0;bottom:0;z-index:0}

/* LEFT PANEL */
.lp{position:fixed;top:64px;left:10px;width:210px;background:var(--panel);backdrop-filter:blur(8px);border-radius:12px;border:1px solid var(--border);z-index:500;overflow:hidden}
.lp-head{padding:9px 12px 6px;border-bottom:1px solid var(--border)}
.lp-head .t{font-size:11px;font-weight:700;color:#c5d5f0}
.lp-head .s{font-size:10px;color:var(--muted);margin-top:1px}
.lp-body{padding:8px 12px 10px}
.vrow{margin-bottom:7px}
.vrow:last-child{margin-bottom:0}
.vrow .lbl{font-size:10px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:3px}
.vrow .lbl .nm{font-weight:600;color:#e2e8f0}
.vrow .lbl .pct{color:#94a3b8}
.vbar{height:5px;border-radius:3px;overflow:hidden;background:rgba(255,255,255,.1)}
.vbar-fill{height:100%;border-radius:3px;transition:width .5s}
.vrow .votes{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}

.slider-section{padding:8px 12px;border-top:1px solid var(--border)}
.sl-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.sl-lbl{font-size:10px;color:var(--muted);white-space:nowrap;min-width:56px}
input[type=range]{flex:1;accent-color:#60a5fa;height:3px}
.sl-v{font-size:11px;font-weight:700;color:#60a5fa;min-width:32px;text-align:right}
.toggle-row{display:flex;align-items:center;gap:6px;margin-top:4px}
.tog{position:relative;width:30px;height:16px;display:inline-block}
.tog input{opacity:0;width:0;height:0}
.tog-sl{position:absolute;inset:0;background:#475569;border-radius:16px;cursor:pointer;transition:.3s}
.tog-sl::before{content:"";position:absolute;width:12px;height:12px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.3s}
.tog input:checked+.tog-sl{background:#3b82f6}
.tog input:checked+.tog-sl::before{transform:translateX(14px)}
.tog-lbl{font-size:10px;color:var(--muted);line-height:1.3}

/* RIGHT PANEL */
.rp{position:fixed;top:64px;right:10px;width:290px;background:var(--panel2);border-radius:12px;border:1px solid #e2e8f0;z-index:500;max-height:calc(100vh - 74px);overflow-y:auto;display:none;box-shadow:0 4px 24px rgba(0,0,0,.18)}
.rp.show{display:block}
.rp-head{padding:10px 14px 8px;border-bottom:1px solid #f1f5f9;position:sticky;top:0;background:var(--panel2);z-index:1}
.rp-name{font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
.rp-dist{font-size:11px;color:var(--muted);margin-top:2px}
.rp-close{margin-left:auto;cursor:pointer;color:#94a3b8;font-size:16px;line-height:1;padding:2px 4px}
.rp-body{padding:10px 14px}

.sect{margin-bottom:12px}
.sect-title{font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.bar-row{margin-bottom:5px}
.bar-lbl{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px;color:var(--text)}
.bar-lbl .nm{font-weight:500}
.bar-lbl .pv{font-weight:700}
.bar-track{height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.bf-g{background:#1e8c46}.bf-b{background:#1451a0}.bf-w{background:#7c3aed}
.bf-bw{background:linear-gradient(90deg,#1451a0 45%,#7c3aed 45%)}

.verdict-box{margin-top:8px;padding:7px 10px;border-radius:8px;font-size:12px;font-weight:700;text-align:center}
.vb-g{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
.vb-b{background:#dbeafe;color:#1e3a8a;border:1px solid #93c5fd}
.vb-o{background:#fff7ed;color:#9a3412;border:1px solid #fdba74}

.integ-row{display:flex;align-items:center;gap:5px;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:6px}
.integ-lbl{font-size:10px;color:#64748b;flex:1}
.integ-v{font-size:13px;font-weight:700;color:#1451a0}

.proj-table{width:100%;font-size:11px;border-collapse:collapse;margin-top:4px}
.proj-table th{text-align:left;color:#94a3b8;font-weight:600;padding:3px 4px;border-bottom:1px solid #f1f5f9;font-size:10px}
.proj-table td{padding:4px 4px;border-bottom:1px solid #f8fafc;color:var(--text)}
.proj-table td.g{font-weight:700;color:#1e8c46}
.proj-table td.b{font-weight:700;color:#1451a0}
.proj-table td.w{font-weight:700;color:#7c3aed}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.stat-box{background:#f8fafc;border-radius:7px;padding:7px 9px;text-align:center}
.stat-box .sv{font-size:15px;font-weight:700;color:var(--text)}
.stat-box .sl{font-size:9px;color:#94a3b8;margin-top:2px}

/* LEGEND */
.legend{position:fixed;top:64px;right:310px;background:var(--panel);backdrop-filter:blur(8px);border-radius:10px;border:1px solid var(--border);z-index:500;padding:10px 12px;min-width:170px}
.legend.hide-when-rp{display:block}
.leg-title{font-size:10px;font-weight:700;color:#c5d5f0;margin-bottom:7px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:10.5px;color:#cbd5e1;margin-bottom:4px}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* RACE BAR */
.race-bar{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:var(--panel);backdrop-filter:blur(8px);border-radius:20px;border:1px solid var(--border);z-index:500;display:flex;gap:4px;padding:5px 8px}
.rb-btn{padding:5px 13px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#c5d5f0;transition:all .2s;white-space:nowrap}
.rb-btn.active{background:#e8f0fe;color:#1a2744}

/* Tag */
.tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:6px;font-weight:700;vertical-align:middle;margin-left:4px}
.tag-ok{background:#d1fae5;color:#065f46}
.tag-warn{background:#fef3c7;color:#92400e}
</style>
</head>

function council(d){
  const r=DR[d].c22, fvp=fvP(d), bv=Math.round((el(d)-fvp)*tr), fvv=Math.round(fvp*tr);
  let k=Math.round(bv*r.k)+Math.round(fvv*FV_R.b);
  let t=Math.round(bv*r.t)+Math.round(fvv*FV_R.w);
  let dpp=Math.round(bv*r.d)+Math.round(fvv*FV_R.g);
  const tot=Math.round(el(d)*tr);
  if(scen==='A') return{k,t,dpp,tot,mode:'A'};
  const bw=k+t,kept=Math.round(bw*ir),lost=bw-kept,td=Math.round(lost*.3);
  if(d==='east') return{linYZ:kept,dpp:dpp+td,k,t,tot,mode:'B'};
  return{kmtBW:kept,dpp:dpp+td,k,t,tot,mode:'B'};
}

function totals(){
  const e=mayor('east'),w=mayor('west');
  if(scen==='A') return{g:e.g+w.g,b:e.b+w.b,wh:e.w+w.w,tot:e.tot+w.tot,mode:'A'};
  return{g:e.g+w.g,bw:e.bw+w.bw,tot:e.tot+w.tot,mode:'B'};
}

function pct(v,t){return t>0?(v/t*100).toFixed(1):'0.0';}
function fmt(v){return Math.round(v).toLocaleString();}

// ── 顏色邏輯 ──────────────────────────────────
function mayorColor(d){
  const mv=mayor(d);
  if(mv.mode==='A'){
    // 在三腳督，綠通常最高，但看藍+白能否超越綠
    const bwSum=mv.b+mv.w;
    if(bwSum>mv.g) return '#c25d00'; // 整合關鍵
    return '#1e8c46'; // 綠勝
  }else{
    const diff=mv.bw-mv.g, tot=mv.g+mv.bw, dp=Math.abs(diff)/tot*100;
    if(diff>0&&dp>=8) return '#0d3070';
    if(diff>0&&dp>=3) return '#1451a0';
    if(diff<0&&dp>=5) return '#1e8c46';
    return '#c25d00';
  }
}
function councilColor(d,race){
  if(race==='east'&&d==='west') return '#94a3b8';
  if(race==='west'&&d==='east') return '#94a3b8';
  const cv=council(d);
  if(cv.mode==='A'){
    return d==='east'?'#c25d00':'#1451a0';
  }else{
    if(d==='east'){
      const diff=cv.linYZ-cv.dpp, dp=Math.abs(diff)/(cv.linYZ+cv.dpp+1)*100;
      if(diff>0&&dp>=5) return '#1451a0';
      if(diff<0&&dp>=5) return '#1e8c46';
      return '#c25d00';
    }else{
      const diff=cv.kmtBW-cv.dpp, dp=Math.abs(diff)/(cv.kmtBW+cv.dpp+1)*100;
      if(diff>0&&dp>=5) return '#1451a0';
      if(diff<0) return '#1e8c46';
      return '#c25d00';
    }
  }
}
function getColor(d){
  if(race==='mayor') return mayorColor(d);
  if(race==='east') return councilColor(d,'east');
  return councilColor(d,'west');
}

// ── Google Maps ───────────────────────────────
function initMap(){
  map=new google.maps.Map(document.getElementById('map'),{
    center:{lat:23.4801,lng:120.4491},zoom:13,
    mapTypeId:'roadmap',
    styles:[
      {featureType:'all',elementType:'labels.text.fill',stylers:[{color:'#ffffff'}]},
      {featureType:'water',stylers:[{color:'#1a3a5c'}]},
      {featureType:'landscape',stylers:[{color:'#2a3a4a'}]},
      {featureType:'road',stylers:[{color:'#1e2d3d'}]},
      {featureType:'poi',stylers:[{visibility:'off'}]},
      {featureType:'transit',stylers:[{visibility:'off'}]},
    ],
    disableDefaultUI:false,
    zoomControl:true,
  });
  iw=new google.maps.InfoWindow();

  VIL.forEach(v=>{
    const pts=v.geometry.type==='Polygon'
      ?v.geometry.coordinates.map(r=>r.map(([lng,lat])=>({lat,lng})))
      :[].concat(...v.geometry.coordinates.map(p=>p.map(r=>r.map(([lng,lat])=>({lat,lng})))));
    const poly=new google.maps.Polygon({
      paths:pts,strokeColor:'#fff',strokeOpacity:.9,strokeWeight:1,
      fillColor:getColor(v.district),fillOpacity:.78,map
    });
    poly.addListener('click',()=>{selV=v.villcode;renderRP(v.villcode);});
    poly.addListener('mouseover',e=>{
      poly.setOptions({fillOpacity:.95});
      iw.setContent(`<div style="font-size:12px;font-weight:700;color:#1e293b">${v.name}</div><div style="font-size:10px;color:#64748b">${v.district==='east'?'東區':'西區'}</div>`);
      iw.setPosition(e.latLng); iw.open(map);
    });
    poly.addListener('mouseout',()=>{poly.setOptions({fillOpacity:.78});iw.close();});
    polygons[v.villcode]=poly;
  });
  upd();
}

function refreshColors(){
  VIL.forEach(v=>{ const p=polygons[v.villcode]; if(p) p.setOptions({fillColor:getColor(v.district)}); });
}

  ));

}
function upd(){
  ir=parseInt(document.getElementById('integSlider').value)/100;
  tr=parseInt(document.getElementById('turnSlider').value)/100;
  fv=document.getElementById('fvTog').checked;
  document.getElementById('integV').textContent=Math.round(ir*100)+'%';
  document.getElementById('turnV').textContent=Math.round(tr*100)+'%';
  document.getElementById('integRow').style.display=scen==='B'?'flex':'none';
  renderLP(); refreshColors(); renderLegend();
  if(selV) renderRP(selV);
}

// ── 時鐘 ──────────────────────────────────────
(function tick(){
  const n=new Date(),p=x=>String(x).padStart(2,'0');
  document.getElementById('clock').textContent='🕐 '+n.getFullYear()+'/'+p(n.getMonth()+1)+'/'+p(n.getDate())+' '+p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
  setTimeout(tick,1000);
})();
</script>
